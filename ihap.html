<!DOCTYPE html>
<head>
  <style>
    body {
      background: linear-gradient(180deg, #7632a7, #48034e);
      min-height: 100vh;
      margin: 0;
      color: white;
      font-family: 'Courier New', monospace; /* The computer font */
    }
    .img{
       width: 300px;
       height: 300px;;
       animation-name: slideleft;
       animation-duration: 2s;
       animation-iteration-count: infinite;
       animation-direction: normal;
       animation-play-state: running;
       animation-timing-function: steps(10);
       padding:0%;
  
       
}
@keyframes slideleft{
  from{transform: translateX(300%)}
}
.cc{
  font-size: 40px;
    text-align:center ;
    font-size: 200%;
    padding: 90px;
    color:rgb(209, 212, 212);
    font-family: 'Courier New', monospace;
    font-style: italic;
   font-weight: bold;

}
.cp{
  font-size: 40px;
    text-align:center ;
    font-size: 200%;
    
    color:rgb(209, 212, 212);
    font-family: 'Courier New', monospace;
    font-style: italic;
   font-weight: bold;
}




  </style>
</head>
<body>
    <h2 class="cc">Congratulations on being gay and 
      on making the South Island team! 🎉</h2>
    <img src="bbb.png" class="img" >
    <h2 class="cp">Here is your carrot cake to celebrate your achievement! I cannot bake, so I asked Chamber..</h2>
    
  
</body>
</html>
